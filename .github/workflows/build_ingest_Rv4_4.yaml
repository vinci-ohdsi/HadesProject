name: Build ingest branch on version tag in main for R 4.4

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref_to_merge:
        description: 'Tag or commit SHA to merge into ingest_Rv4.4 (e.g. v4.4.99)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    # Allow either tag-push runs or manual dispatch runs
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve source ref
        id: src
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SOURCE_REF="${{ github.event.inputs.ref_to_merge }}"
          else
            SOURCE_REF="${GITHUB_REF#refs/tags/}"
          fi
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "Using source ref: $SOURCE_REF"

      - name: Ensure source commit is on main
        run: |
          git fetch origin main --tags
          git rev-parse "${{ steps.src.outputs.source_ref }}" >/dev/null 2>&1 || {
            echo "Invalid ref: ${{ steps.src.outputs.source_ref }}"
            exit 1
          }
          
          SOURCE_SHA="$(git rev-parse "${{ steps.src.outputs.source_ref }}^{commit}")"

          if git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Source commit is on main"
          else
            echo "Source commit is NOT on main"
            exit 1
          fi

      - name: Merge source ref into ingest_Rv4.4
        run: |
          # Configure git identity for the bot
          git config user.name "Marc A. Suchard [github bot]"
          git config user.email "msuchard@ucla.edu"
          
          git fetch --all --tags
          SOURCE_SHA="$(git rev-parse "${{ steps.src.outputs.source_ref }}^{commit}")"

          git checkout ingest_Rv4.4
          git pull origin ingest_Rv4.4

          git merge --no-commit --no-ff "$SOURCE_SHA" -m "Merge ${{ steps.src.outputs.source_ref }} into ingest_Rv4.5"
          if [ $? -ne 0 ]; then
            echo "Merge failed"
            exit 1
          fi
          
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'

      - name: Prepare clean R 4.4 project library
        run: |
          Rscript -e "cat(R.version.string, '\n')"
          Rscript -e "cat(R.version\$platform, '\n')"
          Rscript -e "stopifnot(as.character(getRversion()) == '4.4.3')"

          # Remove all previously generated Windows project libraries.
          rm -rf renv/library/windows

          #  Recreate the expected parent directory.
          mkdir -p renv/library/windows

      - name: Restore R dependencies
        env:
          RENV_CONFIG_CACHE_ENABLED: "FALSE"
          RENV_CONFIG_CACHE_SYMLINKS: "FALSE"
          RENV_CONFIG_UPDATES_CHECK: "FALSE"
        run: |
          Rscript -e "install.packages('renv', repos='https://cloud.r-project.org')"
          Rscript -e "renv::restore(packages = 'renv', prompt = FALSE)"
          Rscript -e "renv::restore(prompt = FALSE)"

      - name: Verify generated library
        env:
            RENV_CONFIG_CACHE_ENABLED: "FALSE"
            RENV_CONFIG_CACHE_SYMLINKS: "FALSE"
        run: |
          Rscript --vanilla -e "
              source('renv/activate.R')

              expected <- normalizePath(
                'renv/library/windows/R-4.4/x86_64-w64-mingw32',
                winslash = '/',
                mustWork = TRUE
              )

              actual <- normalizePath(
                renv::paths\$library(),
                winslash = '/',
                mustWork = TRUE
              )

              cat('Expected:', expected, '\n')
              cat('Actual:  ', actual, '\n')
              print(.libPaths())

              stopifnot(getRversion() >= '4.4')
              stopifnot(getRversion() < '4.5')
              stopifnot(identical(actual, expected))
              stopifnot(requireNamespace('renv', quietly = TRUE))
            "

          # Ensure the deployable library does not contain cache junctions.
          powershell -NoProfile -Command '
              $links = Get-ChildItem `
                -Path "renv/library/windows/R-4.4" `
                -Recurse -Force |
                Where-Object {
                  $_.Attributes -band [System.IO.FileAttributes]::ReparsePoint
                }

              if ($links) {
                $links | Select-Object FullName, LinkType, Target
                throw "The portable renv library contains junctions or symbolic links."
              }
            '

      - name: Commit and push changes
        run: |
            git config user.name "Marc A. Suchard [github bot]"
            git config user.email "msuchard@ucla.edu"

            git add -f -A -- renv/library

            if ! git diff --cached --quiet; then
              git commit -m "Build portable Windows R 4.4 renv library from ${{ steps.src.outputs.source_ref }}"
              git push origin ingest_Rv4.4
            else
              echo "No changes to commit"
            fi
              

